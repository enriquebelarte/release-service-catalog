---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sign-oot-kmods
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: release
spec:
  description: >-
    Tekton pipeline to sign OOT kernel modules and upload them to an internal Gitlab repository.
  params:
    - name: release
      type: string
      description:
    - name: releasePlan
      type: string
      description: The namespaced name (namespace/name) of the releasePlan
    - name: releasePlanAdmission
      type: string
      description: The namespaced name (namespace/name) of the releasePlanAdmission
    - name: releaseServiceConfig
      type: string
      description: The namespaced name (namespace/name) of the releaseServiceConfig
    - name: snapshot
      type: string
      description: The namespaced name (namespace/name) of the snapshot
    - name: enterpriseContractPolicy
      type: string
      description: JSON representation of the EnterpriseContractPolicy    
    - name: releasedVersion
      type: string
    - name: taskGitRevision
      type: string
      default: main
    - name: taskGitUrl
      type: string
      default: https://github.com/konflux-ci/release-service-catalog.git 
    - name: kmodsPath
      type: string
      description: Path where kmods are built inside the image
    - name: signedKmodsPath
      type: string
      description: Directory where signed kmods will be in the internal repository
      default: signed-kmods
    - name: artifact-repo-url
      type: string
    - name: artifact-branch
      type: string
      default: main
    - name: vendor
      type: string
    - name: signing-secret
      type: string
    - name: signingAuthor
      type: string
  workspaces:
    - name: release-workspace
  tasks:
    - name: verify-access-to-resources
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: tasks/managed/verify-access-to-resources/verify-access-to-resources.yaml
      params:
        - name: release
          value: $(params.release)
        - name: releasePlan
          value: $(params.releasePlan)
        - name: releasePlanAdmission
          value: $(params.releasePlanAdmission)
        - name: releaseServiceConfig
          value: $(params.releaseServiceConfig)
        - name: snapshot
          value: $(params.snapshot)
        - name: requireInternalServices
          value: "false"
    - name: extract-oot-kmods
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: tasks/managed/extract-oot-kmods/extract-oot-kmods.yaml
      params:
        - name: kmodsPath 
          value: $(params.kmodsPath)
        - name: signedKmodsPath
          value: $(params.signedKmodsPath)
        - name: releasedVersion
          value: $(params.releasedVersion)
        - name: snapshot
          value: $(params.snapshot)
        - name: remoteRegistry
          value: ""
      workspaces:
        - name: input-data
          workspace: release-workspace
      runAfter:
        - verify-access-to-resources
          
    - name: sign-oot-kmods
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: tasks/managed/sign-oot-kmods/sign-oot-kmods.yaml
      params:
        - name: signedKmodsPath
          value: $(params.signedKmodsPath)
        - name: pipelineRunUid
          value: $(context.pipelineRun.uid)
        - name: kerberosRealm
          value: IPA.REDHAT.COM 
        - name: signingAuthor
          value: $(params.signingAuthor) 
        - name: signing-secret
          value: $(params.signing-secret)
      workspaces:
        - name: kmods
          workspace: release-workspace
      runAfter:
        - extract-oot-kmods
    - name: push-oot-kmods
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: tasks/managed/push-oot-kmods/push-oot-kmods.yaml
      params:
        - name: signedKmodsPath
          value: $(params.signedKmodsPath)
        - name: vendor
          value: $(params.vendor)
        - name: artifactRepoUrl
          value: $(params.artifact-repo-url)
        - name: artifactBranch
          value: $(params.artifact-branch)
      workspaces:
        - name: signed-kmods
          workspace: release-workspace
      runAfter:
        - sign-oot-kmods
